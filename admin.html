<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - ACITY CONNECT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Admin Dashboard</h1>
    <p id="userStatus">Not logged in</p>
</header>

<nav>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="marketplace.html">Marketplace</a></li>
        <li><a href="skill.html">Skill</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="admin.html">Admin</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="#" id="logout">Logout</a></li>
    </ul>
    <div class="cart-icon">Requests: <span id="cartCount">0</span></div>
</nav>

<section id="adminDashboard">
    <h2>Platform Activity</h2>
    <div class="grid stats-grid">
        <div class="card">
            <h3 id="totalListings">0</h3>
            <p>Total Listings</p>
        </div>
        <div class="card">
            <h3 id="pendingListings">0</h3>
            <p>Pending Approval</p>
        </div>
        <div class="card">
            <h3 id="totalInteractions">0</h3>
            <p>Total Interactions</p>
        </div>
    </div>

    <h2>Moderate Listings</h2>
    <input type="text" id="listingSearch" placeholder="Search listings..." class="search">
    <select id="categoryFilter">
        <option value="All">All Categories</option>
        <option value="Item">Items</option>
        <option value="Skill">Skills</option>
    </select>
    <select id="statusFilter">
        <option value="All">All Statuses</option>
        <option value="Available">Available</option>
        <option value="Swapped">Swapped</option>
        <option value="Sold">Sold</option>
    </select>

    <div id="listingFeed" class="grid"></div>
</section>

<footer>
    <p>© 2026 ACITY CONNECT</p>
</footer>

<script src="script.js"></script>
</body>
</html>
