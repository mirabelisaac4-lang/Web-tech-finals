<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Exchange</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>



<header>
    <h1>Skill Exchange</h1>
    <p id="userStatus">Not logged in</p>
</header>

<nav>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="marketplace.html">Marketplace</a></li>
        <li><a href="skill.html">Skill</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="admin.html">Admin</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="#" id="logout">Logout</a></li>
    </ul>
    <div class="cart-icon">Requests: <span id="cartCount">0</span></div>
</nav>

<section>
    <h2>Offer or Request a Skill</h2>

    <form id="listingForm">
        <label>Title:</label>
        <input type="text" id="listingTitle" required>

        <label>Description:</label>
        <textarea id="listingDescription" required></textarea>

        <label>Category:</label>
        <select id="listingCategory" required>
            <option value="Skill">Skill</option>
            <option value="Item">Item</option>
        </select>

        <label>Status:</label>
        <select id="listingStatus" required>
            <option value="Available">Available</option>
            <option value="Swapped">Swapped</option>
            <option value="Sold">Sold</option>
        </select>

        <button type="submit">Submit Skill Listing</button>
    </form>
</section>

<section >
    <h2>Searchable Skill Feed</h2>
    <p>Connect with talented students offering valuable services and skills.</p>

    <input type="text" id="listingSearch" placeholder="Search skills..." class="search">
    <select id="statusFilter">
        <option value="All">All Statuses</option>
        <option value="Available">Available</option>
        <option value="Swapped">Swapped</option>
        <option value="Sold">Sold</option>
    </select>

    <div id="listingFeed" class="grid" data-category="Skill"></div>
</section>

<footer>
    <p>© 2026 ACITY CONNECT</p>
</footer>

<script src="script.js"></script>
</body>
</html>
