<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ACITY CONNECT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Student Profile</h1>
    <p id="userStatus">Not logged in</p>
</header>

<nav>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="marketplace.html">Marketplace</a></li>
        <li><a href="skill.html">Skill</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="admin.html">Admin</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="#" id="logout">Logout</a></li>
    </ul>
    <div class="cart-icon">Requests: <span id="cartCount">0</span></div>
</nav>

<section>
    <h2>Update Profile Information</h2>
    <form id="profileForm">
        <label>Full Name:</label>
        <input type="text" id="profileName" required>

        <label>Email:</label>
        <input type="email" id="profileEmail" readonly>

        <label>Phone Number:</label>
        <input type="text" id="profilePhone">

        <label>Skills Offered:</label>
        <textarea id="skillsOffered" placeholder="Example: Web design, math tutoring"></textarea>

        <label>Skills Needed:</label>
        <textarea id="skillsNeeded" placeholder="Example: Python help, second-hand calculator"></textarea>

        <button type="submit">Save Profile</button>
    </form>
</section>

<section>
    <h2>My Trade Requests and Notifications</h2>
    <div id="interactionList"></div>
</section>

<footer>
    <p>© 2026 ACITY CONNECT</p>
</footer>

<script src="script.js"></script>
</body>
</html>
